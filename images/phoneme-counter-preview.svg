<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Literacy Arcade Phoneme Counter — map words into sound boxes for letterbox lessons">
  <title>Literacy Arcade Phoneme Counter preview</title>
  <desc>Preview card showing the Phoneme Counter tool with the word "ship" mapped into three sound boxes for sh, i, and p, on a cream Literacy Arcade-branded background.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F9F8"/>
      <stop offset="55%" stop-color="#FAF8F4"/>
      <stop offset="100%" stop-color="#F3EEFB"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43c6bd"/>
      <stop offset="100%" stop-color="#6975b8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g transform="translate(80, 64)">
    <rect width="56" height="56" rx="14" fill="url(#logo)"/>
    <text x="28" y="42" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="32" font-weight="700" fill="#FFFFFF">L</text>
    <text x="78" y="40" font-family="Nunito, sans-serif" font-size="26" font-weight="900" fill="#1a2340" letter-spacing="-0.3">Literacy Arcade</text>
  </g>

  <g transform="translate(80, 200)">
    <rect width="180" height="34" rx="17" fill="#E1F5EE" stroke="#A8DDD9" stroke-width="1.5"/>
    <text x="90" y="22" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" font-weight="900" fill="#0F6E56" letter-spacing="2">TEACHER TOOL</text>
  </g>

  <text x="80" y="300" font-family="Nunito, sans-serif" font-size="80" font-weight="900" fill="#1a2340" letter-spacing="-1">Phoneme</text>
  <text x="80" y="380" font-family="Nunito, sans-serif" font-size="80" font-weight="900" fill="#1a2340" letter-spacing="-1">Counter</text>

  <text x="80" y="430" font-family="Lexend, sans-serif" font-size="22" font-weight="600" fill="#6b7a99">Map words into sound boxes</text>
  <text x="80" y="460" font-family="Lexend, sans-serif" font-size="22" font-weight="600" fill="#6b7a99">for letterbox lessons.</text>

  <g transform="translate(80, 500)">
    <rect width="180" height="42" rx="12" fill="#FFFFFF" stroke="rgba(26,35,64,0.12)" stroke-width="1.5"/>
    <circle cx="22" cy="21" r="5" fill="#1D9E75"/>
    <text x="40" y="28" font-family="Lexend, sans-serif" font-size="14" font-weight="700" fill="#1a2340">Vowel teams</text>

    <rect x="196" width="240" height="42" rx="12" fill="#FFFFFF" stroke="rgba(26,35,64,0.12)" stroke-width="1.5"/>
    <circle cx="218" cy="21" r="5" fill="#D85A30"/>
    <text x="236" y="28" font-family="Lexend, sans-serif" font-size="14" font-weight="700" fill="#1a2340">R-controlled vowels</text>

    <rect x="452" width="160" height="42" rx="12" fill="#FFFFFF" stroke="rgba(26,35,64,0.12)" stroke-width="1.5"/>
    <circle cx="474" cy="21" r="5" fill="#6975b8"/>
    <text x="492" y="28" font-family="Lexend, sans-serif" font-size="14" font-weight="700" fill="#1a2340">Diphthongs</text>
  </g>

  <g transform="translate(680, 150)">
    <rect width="440" height="330" rx="24" fill="#FFFFFF" stroke="rgba(26,35,64,0.12)" stroke-width="1.5"/>

    <g transform="translate(0, 0)">
      <rect width="440" height="60" rx="24" fill="#1a2340"/>
      <rect y="36" width="440" height="24" fill="#1a2340"/>
      <text x="28" y="38" font-family="Nunito, sans-serif" font-size="20" font-weight="900" fill="#FFFFFF">Result</text>
      <rect x="296" y="16" width="124" height="28" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
      <text x="358" y="35" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" font-weight="900" fill="#FFFFFF">3 phonemes</text>
    </g>

    <g transform="translate(60, 96)">
      <rect width="320" height="78" rx="14" fill="#FFFFFF" stroke="rgba(26,35,64,0.12)" stroke-width="2"/>
      <text x="160" y="56" text-anchor="middle" font-family="Nunito, sans-serif" font-size="52" font-weight="900" fill="#1a2340" letter-spacing="3">ship</text>
    </g>

    <g transform="translate(48, 200)">
      <g>
        <rect width="112" height="92" rx="8" fill="#FFFFFF" stroke="#08729a" stroke-width="3"/>
        <text x="56" y="62" text-anchor="middle" font-family="Nunito, sans-serif" font-size="40" font-weight="900" fill="#06638A">sh</text>
      </g>
      <g transform="translate(112, 0)">
        <rect width="112" height="92" fill="#FFFFFF" stroke="#08729a" stroke-width="3"/>
        <text x="56" y="62" text-anchor="middle" font-family="Nunito, sans-serif" font-size="40" font-weight="900" fill="#06638A">i</text>
      </g>
      <g transform="translate(224, 0)">
        <rect width="112" height="92" rx="8" fill="#FFFFFF" stroke="#08729a" stroke-width="3"/>
        <text x="56" y="62" text-anchor="middle" font-family="Nunito, sans-serif" font-size="40" font-weight="900" fill="#06638A">p</text>
      </g>
    </g>
  </g>

  <text x="80" y="600" font-family="Nunito, sans-serif" font-size="14" font-weight="700" fill="#9090A8" letter-spacing="1">literacyarcade.com</text>
</svg>
