<style>
:root{--cream:#F9F7F2;--white:#fff;--navy:#1B2A4A;--navy-soft:#4B5875;--teal:#2EC4B6;--teal-dark:#087A70;--teal-light:#D9F8F5;--border:#E1E4EA;--shadow:0 10px 34px rgba(27,42,74,.12);--font-head:'Nunito',sans-serif;--font-body:'Lexend',sans-serif}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:var(--font-body);color:var(--navy);background:radial-gradient(circle at top left,rgba(46,196,182,.20),transparent 34%),radial-gradient(circle at top right,rgba(255,107,107,.13),transparent 32%),var(--cream);display:flex;flex-direction:column}
.la-header{height:58px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;box-shadow:0 2px 8px rgba(27,42,74,.06)}
.la-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--navy)}
.la-logo{width:36px;height:36px;border-radius:9px;overflow:hidden;background:linear-gradient(135deg,var(--teal),#7B5EA7);display:grid;place-items:center;color:white;font-family:Georgia,serif;font-weight:700;font-style:italic}
.la-logo img{width:100%;height:100%;object-fit:cover;display:block}
.la-wordmark{font-family:var(--font-head);font-weight:900;font-size:18px}
.la-divider{width:1px;height:22px;background:var(--border)}
.la-page-title{font-family:var(--font-head);font-weight:800;color:var(--teal-dark)}
.home-btn{margin-left:auto;height:36px;width:36px;border:1.5px solid var(--border);border-radius:10px;background:#fff;display:grid;place-items:center;color:var(--navy-soft);text-decoration:none}
.home-btn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
main{flex:1;display:grid;place-items:center;padding:36px 18px}
.login-card{width:min(100%,480px);background:rgba(255,255,255,.94);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);padding:34px;text-align:center}
.badge{display:inline-flex;align-items:center;justify-content:center;border:1.5px solid var(--teal);background:var(--teal-light);color:var(--teal-dark);border-radius:999px;padding:5px 14px;font-family:var(--font-head);font-size:11px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:14px}
h1{font-family:var(--font-head);font-size:36px;line-height:1.05;margin:0 0 10px;color:var(--navy)}
p{color:var(--navy-soft);line-height:1.55;font-size:15px;margin:0 0 24px}
.google-btn{width:100%;min-height:54px;border:1.5px solid var(--border);border-radius:14px;background:#fff;color:var(--navy);font-family:var(--font-head);font-size:17px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 4px 0 rgba(27,42,74,.08)}
.google-btn:hover{background:#F7FAFA;border-color:rgba(8,122,112,.35)}
.google-mark{width:22px;height:22px;display:inline-block}
.note{margin-top:18px;font-size:12px;color:rgba(27,42,74,.58)}
.error{margin-top:14px;color:#B42318;font-family:var(--font-head);font-weight:800;font-size:13px;display:none}
.la-footer{text-align:center;padding:12px 18px;color:rgba(27,42,74,.35);font-family:var(--font-head);font-size:12px;font-weight:800}
@media(max-width:560px){.login-card{padding:26px 20px}h1{font-size:31px}}
</style>

<script type="module">
import { auth } from './firebase-config.js';
import { GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const loginBtn = document.getElementById('googleLoginBtn');
const errorMsg = document.getElementById('errorMsg');
const provider = new GoogleAuthProvider();

onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = 'teacher-dashboard.html';
});

loginBtn.addEventListener('click', async () => {
  errorMsg.style.display = 'none';
  loginBtn.disabled = true;
  loginBtn.innerHTML = 'Signing in...';
  try {
    await signInWithPopup(auth, provider);
    window.location.href = 'teacher-dashboard.html';
  } catch (error) {
    console.error(error);
    errorMsg.textContent = 'Google sign-in did not work. Check Firebase authorized domains and try again.';
    errorMsg.style.display = 'block';
    loginBtn.disabled = false;
    loginBtn.innerHTML = 'Sign in with Google';
  }
});
</script>
