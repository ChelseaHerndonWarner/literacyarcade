<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Interactive Phoneme Chart | Literacy Arcade</title>
  <style>
    @font-face{font-family:"Lexend";font-style:normal;font-weight:400;src:url("fonts/lexend-400.ttf") format("truetype");font-display:swap}
    @font-face{font-family:"Lexend";font-style:normal;font-weight:700;src:url("fonts/lexend-700.ttf") format("truetype");font-display:swap}
    @font-face{font-family:"Lexend";font-style:normal;font-weight:900;src:url("fonts/lexend-900.ttf") format("truetype");font-display:swap}
    @font-face{font-family:"Nunito";font-style:normal;font-weight:700;src:url("fonts/nunito-700.ttf") format("truetype");font-display:swap}
    @font-face{font-family:"Nunito";font-style:normal;font-weight:900;src:url("fonts/nunito-900.ttf") format("truetype");font-display:swap}
    :root{
      --la-teal:#2EC4B6;--la-teal-dark:#1FA99C;
      --la-coral:#FF6B6B;--la-coral-dark:#E85555;
      --la-navy:#1A1A2E;--la-navy-soft:#4A4A64;
      --la-cream:#FFF8E8;--la-card:#FFFFFF;--la-white:var(--la-card);
      --la-border:#E6E1D8;--la-muted:#6B7280;
      --la-soft-teal-bg:#EAF9F7;--la-soft-coral-bg:#FFF0ED;
      --teal:var(--la-teal);--teal-dk:var(--la-teal-dark);--coral:var(--la-coral);--coral-dk:var(--la-coral-dark);
      --navy:var(--la-navy);--navy-mid:var(--la-navy-soft);--navy-lt:var(--la-muted);
      --cream:var(--la-cream);--white:var(--la-white);--border:var(--la-border);
      --stop:var(--la-teal);--stop-t:var(--la-soft-teal-bg);--aff:var(--la-teal);--aff-t:var(--la-soft-teal-bg);
      --cont:var(--la-teal);--cont-t:var(--la-soft-teal-bg);--app:var(--la-teal);--app-t:var(--la-soft-teal-bg);
      --vow:var(--la-coral);--vow-t:var(--la-soft-coral-bg);
      --font:"Lexend",system-ui,sans-serif;
      --phon:"Lexend",system-ui,sans-serif;
      --shadow:0 8px 24px rgba(26,26,46,.07),0 2px 6px rgba(26,26,46,.035);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{display:flex;flex-direction:column;margin:0;min-height:100vh;background:linear-gradient(145deg,#EAF6F2 0%,#FAFAF4 46%,#FCF4ED 100%) fixed;color:var(--navy);font-family:var(--font);line-height:1.42}
    body.has-dock{padding-bottom:150px}
    body.has-dock .site-footer{opacity:0;visibility:hidden;pointer-events:none}
    button{font:inherit;cursor:pointer}
    button:focus-visible{outline:3px solid var(--teal-dk);outline-offset:3px}
    h1,h2,h3,p{margin:0}
    .site-nav{height:70px;padding:0 clamp(18px,4vw,34px);background:rgba(255,255,255,.94);border-bottom:1px solid var(--border);box-shadow:0 2px 12px rgba(52,47,93,.05);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;backdrop-filter:blur(10px)}
    .brand-link{display:flex;align-items:center;gap:15px;text-decoration:none;color:var(--navy);font-size:1.15rem;font-weight:900;min-width:0}
    .brand-logo{width:44px;height:44px;flex:none;border-radius:12px;display:block;object-fit:contain;object-position:center;box-shadow:0 6px 16px rgba(36,184,178,.20)}
    .nav-divider{height:34px;width:1px;background:var(--border);margin:0 0 0 2px;flex:none}
    .nav-page{font-size:1.05rem;font-weight:800;color:var(--teal-dk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nav-actions{display:flex;align-items:center}
    .nav-home{width:42px;height:42px;border:1px solid var(--border);border-radius:12px;background:var(--white);display:grid;place-items:center;color:var(--navy-mid);text-decoration:none;transition:background .15s,color .15s;font-size:1.1rem}
    .nav-home:hover{background:var(--cont-t);color:var(--teal-dk)}
    .app{width:min(1120px,calc(100% - 48px));flex:1 0 auto;margin-inline:auto;padding:26px 0 30px}
    .topbar{display:flex;align-items:center;gap:16px;justify-content:space-between;margin-bottom:13px}
    .eyebrow{margin:0 0 2px;color:var(--teal-dk);font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase}
    .topbar h1{font-family:"Nunito",sans-serif;font-size:clamp(28px,3vw,36px);font-weight:700;line-height:1.05;letter-spacing:-.035em}
    .subtitle{margin-top:6px;color:var(--navy-mid);font-size:15px;font-weight:400}
    .controls{display:flex;align-items:center;gap:7px}
    .tabs{display:flex;padding:3px;border:1px solid var(--border);border-radius:999px;background:#F4F2EE}
    .tab,.key{min-height:36px;padding:0 15px;border:0;border-radius:999px;background:transparent;color:var(--navy-mid);font-size:13px;font-weight:700}
    .tab[aria-selected="true"]{background:var(--white);color:var(--teal-dk);box-shadow:0 0 0 1px var(--teal),0 1px 3px rgba(26,26,46,.08)}
    .key{display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--white);color:var(--navy)}
    .info-dot{display:inline-grid;place-items:center;width:16px;height:16px;border:1.5px solid currentColor;border-radius:50%;font-size:10px;font-style:normal;line-height:1}
    .view[hidden]{display:none}
    .chart{display:grid;gap:14px}
    .chart-row{display:flex;gap:14px;align-items:stretch;flex-wrap:wrap}
    .panel{--accent:var(--stop);--tint:var(--stop-t);min-width:0;padding:15px 17px 17px;border:1px solid var(--border);border-top:3px solid var(--accent);border-radius:16px;background:var(--white);box-shadow:var(--shadow)}
    .panel.stops{--accent:var(--stop);--tint:var(--stop-t);flex:1 1 330px}
    .panel.affricates{--accent:var(--aff);--tint:var(--aff-t);flex:1 1 220px}
    .panel.continuants{--accent:var(--cont);--tint:var(--cont-t);width:100%;background:var(--white)}
    .panel.approximants{--accent:var(--app);--tint:var(--app-t);width:100%;background:var(--white)}
    .panel.vowel{--accent:var(--vow);--tint:var(--vow-t)}
    .vshort,.vlong{flex:1 1 360px}.vother{flex:1 1 100%;width:100%}
    .panel-head{display:flex;align-items:center;gap:7px}
    .panel h2{color:var(--navy);font-family:"Nunito",sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em}
    .panel h3{font-family:"Nunito",sans-serif;font-size:14px;font-weight:700}
    .definition{margin:2px 0 8px;color:var(--navy-mid);font-size:12.5px;font-weight:400}
    .sub-definition{margin:3px 0 8px;color:var(--navy-mid);font-size:12px;font-weight:400;line-height:1.35}
    .terms-btn{display:inline-grid;place-items:center;padding:0;border:0;background:transparent;color:currentColor;opacity:.7}
    .terms-btn:hover{opacity:1}
    .nested-group{margin:9px 0 0;padding:10px 11px 11px;border:1px solid var(--border);border-radius:12px;background:var(--tint)}
    .nested-label{margin:0 0 7px;color:var(--navy-mid);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .group-layout{display:flex;gap:8px;flex-wrap:wrap}
    .subpanel{min-width:0;flex:1 1 200px;padding:10px 12px 12px;border:1px solid var(--border);border-radius:10px;background:var(--white)}
    .subpanel.wide{flex:2 1 405px}
    .sound-row{display:flex;align-items:center;gap:8px;margin-top:7px}
    .row-label{display:flex;align-items:center;gap:5px;width:76px;flex:none;color:var(--navy-mid);font-size:11px;font-weight:600}
    .cards{display:flex;flex-wrap:wrap;gap:7px}
    .tile{position:relative;display:grid;place-items:center;width:66px;height:58px;flex:0 0 66px;padding:3px 2px 2px;overflow:visible;border:1.5px solid var(--tint);border-radius:11px;background:var(--white);color:var(--navy);font-family:var(--phon);font-size:20px;font-weight:500;line-height:1.35;transition:transform .15s,box-shadow .15s,border-color .15s}
    .tile span{display:block;line-height:1.35;white-space:nowrap}
    .tile:hover{transform:translateY(-2px);border-color:var(--teal);box-shadow:0 8px 15px -12px rgba(26,26,46,.55)}
    .tile.selected{border-color:var(--teal-dk);box-shadow:0 0 0 2.5px var(--la-soft-teal-bg),0 8px 15px -12px rgba(26,26,46,.55)}
    .slash{font-family:var(--phon);color:var(--navy);font-weight:400;opacity:.45}
    .voice-dot{width:7px;height:7px;border-radius:50%;flex:none}
    .voice-dot.on{background:var(--navy-mid)}
    .voice-dot.off{border:1.5px solid #A9B0BF;background:var(--white)}
    .tile .voice-dot{position:absolute;top:6px;right:6px;width:6px;height:6px}
    .legend{align-self:center;min-width:158px;padding:8px 10px;border:1px solid var(--border);border-radius:10px;background:var(--white);box-shadow:var(--shadow)}
    .legend strong{display:block;margin-bottom:4px;font-size:13px;font-weight:700}
    .legend div{display:flex;align-items:center;gap:5px;margin:4px 0;color:var(--navy-mid);font-size:11px;font-weight:500}
    .legend .voice-dot.on{background:var(--navy-mid)}
    .legend .voice-dot.off{border-color:#A9B0BF}
    .vowel-intro{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
    .vowel-intro h2{color:var(--navy);font-family:"Nunito",sans-serif;font-size:17px;font-weight:700}
    .vowel-note{display:flex;gap:6px;margin:8px 0 14px;padding:10px 12px;border:1px solid var(--border);border-left:4px solid var(--vow);border-radius:12px;background:#fffaf4;color:var(--navy-mid);font-size:13.5px;font-weight:400;line-height:1.45}
    .vowel-note b{color:var(--navy);font-weight:800}
    code{padding:0;background:transparent;color:var(--navy);font:700 1em var(--font)}
    .breadcrumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:var(--navy-mid);font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
    .sep{opacity:.5}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 7px;border-radius:999px;background:var(--tint);color:var(--navy-mid);font-size:10px;font-weight:600;letter-spacing:0;text-transform:none}
    .badge.unvoiced{border:1px solid var(--border);background:var(--white);color:var(--navy-mid)}
    .sound-example{font-family:var(--phon);margin:1px 0;font-size:25px;font-weight:700;line-height:1.15}
    .sound-example .highlight{color:var(--accent);font-weight:700;box-shadow:inset 0 -4px 0 var(--tint)}
    .sound-how{color:var(--navy-mid);font-size:12.5px;font-weight:400;line-height:1.35}
    .audio-area{width:200px;flex:none;text-align:center}
    .play{width:100%;padding:13px 14px;border:0;border-radius:11px;background:var(--accent);color:var(--white);font-size:15px;font-weight:700;box-shadow:0 6px 12px -9px rgba(26,26,46,.57)}
    .play:hover{filter:brightness(1.05)}
    .play[disabled]{opacity:.6;cursor:wait}
    .audio-status{display:block;min-height:13px;margin-top:4px;color:var(--navy-mid);font-size:10px;font-weight:400}
    .audio-status:empty{display:none}
    .modal-scrim,.dialog-backdrop{position:fixed;inset:0;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;backdrop-filter:blur(3px)}
    .modal-scrim{z-index:20;background:rgba(26,26,46,.34)}
    .modal-scrim.open,.dialog-backdrop.open{opacity:1;visibility:visible}
    .dialog-backdrop{z-index:30;background:rgba(26,26,46,.28);backdrop-filter:blur(2px)}
    .sound-dock{position:fixed;left:0;right:0;bottom:0;z-index:21;padding:0 16px 14px;pointer-events:none;display:none;--accent:var(--teal);--tint:var(--la-soft-teal-bg)}
    .sound-dock.show{display:block}
    .dock-inner{pointer-events:auto;width:fit-content;max-width:min(940px,calc(100% - 0px));margin-inline:auto;position:relative;display:flex;align-items:center;gap:22px;padding:16px 22px;border:1.5px solid var(--accent);border-radius:18px;background:var(--white);box-shadow:0 18px 50px -22px rgba(26,26,46,.5)}
    .dock-label{position:absolute;top:-11px;left:18px;margin:0;padding:4px 11px;border-radius:999px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase}
    .dock-content{display:flex;align-items:center;gap:22px;min-height:84px}
    .dock-meta{flex:0 1 auto;min-width:0;display:flex;flex-direction:column;gap:5px}
    .selected-glyph{flex:none;display:grid;place-items:center;width:100px;height:84px;overflow:visible;border:1.5px solid var(--accent);border-radius:15px;background:var(--tint);color:var(--navy);font-family:var(--phon);font-weight:500;font-size:38px;line-height:1.1;white-space:nowrap}
    .drawer{position:fixed;top:0;right:0;z-index:31;display:flex;flex-direction:column;width:min(340px,90vw);height:100%;transform:translateX(103%);background:#FAFAF4;box-shadow:-18px 0 42px -20px rgba(26,26,46,.55);transition:transform .25s}
    .drawer.open{transform:none}
    .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
    .drawer-header h2{font-size:19px;font-weight:700}
    .close{width:29px;height:29px;border:0;border-radius:50%;background:#E9E7E0;color:var(--navy);font-size:21px;line-height:1}
    .drawer-body{padding:5px 17px 20px;overflow:auto}
    .term{padding:7px 0;border-bottom:1px solid var(--border)}
    .term dt{font-size:13px;font-weight:700}
    .term dd{margin:2px 0 0;color:var(--navy-mid);font-size:11.5px;font-weight:400;line-height:1.4}
    .key-note{margin-top:9px;padding:9px 10px;border:1px solid var(--border);border-radius:9px;background:var(--white);color:var(--navy-mid);font-size:11.5px;font-weight:400;line-height:1.4}
    .key-note b{color:var(--navy);font-weight:700}
    .term dt{display:flex;align-items:center;gap:7px}
    .term-audio{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(46,196,182,.35);border-radius:999px;background:rgba(46,196,182,.09);color:var(--teal-dark);cursor:pointer;transition:.16s ease;flex:none}
    .term-audio:hover,.term-audio:focus-visible{background:rgba(46,196,182,.17);border-color:rgba(31,169,156,.65);transform:translateY(-1px);outline:none}
    .term-audio svg{width:14px;height:14px;display:block;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .site-footer{width:min(1120px,calc(100% - 48px));margin:auto auto 0;padding:0 0 22px;color:var(--navy-mid);font-size:11px;font-weight:600;text-align:center}

    @media(max-width:650px){.site-nav{height:64px}.brand-link{gap:10px}.brand-logo{width:38px;height:38px}.brand-link span:first-of-type{font-size:1rem}.nav-divider{height:28px}.nav-page{font-size:.9rem}.nav-home{width:38px;height:38px}}
    @media(max-width:730px){
      .site-nav{padding:0 13px}.nav-page{display:none}.brand-link{font-size:1rem}
      .app{width:min(100% - 22px,1120px);padding-top:17px}.topbar{align-items:flex-start;flex-direction:column;gap:11px}.controls{width:100%;justify-content:space-between}
      .tab{padding:0 14px}.key{padding:0 13px}.panel{padding:11px}.row-label{width:68px;font-size:10px}.tile{width:60px;height:53px;flex-basis:60px;font-size:18px}.sound-row{gap:6px}.nested-group{margin-left:3px;padding-left:9px}.group-layout{gap:9px}.subpanel{flex-basis:100%}.legend{width:100%;min-width:0}
      body{padding-bottom:235px}
      .sound-dock{padding:0 11px 11px}.dock-inner{width:auto;max-width:100%;flex-wrap:wrap;gap:13px}.dock-content{flex-wrap:wrap;width:100%}.dock-meta{flex:1 1 60%;order:2}.selected-glyph{width:84px;height:72px;font-size:34px}.audio-area{order:3;flex:1 1 100%;width:100%}.sound-example{font-size:22px}.vowel-note{font-size:12.5px;padding:9px 10px}
    }
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{transition:none!important;animation:none!important}}
  </style>
</head>

  <script>
  (()=>{
    const terms={phoneme:['Phoneme','A speech sound.'],grapheme:['Grapheme','A letter or group of letters that spells a sound.'],voiced:['Voiced','Your vocal cords are on. Put your hand on your throat and feel a buzz.'],unvoiced:['Unvoiced','Your vocal cords are off. Just air, no buzz.'],stops:['Stops','Quick sounds made by stopping and releasing air.'],affricates:['Affricates','Sounds that begin with stopped air and then release through a narrow space.'],continuants:['Continuants','Sounds you can stretch or hold.'],fricatives:['Fricatives','Sounds made by air leaking through a narrow space.'],nasals:['Nasals','Sounds where air comes through the nose.'],approximants:['Approximants','Smooth sounds made without fully blocking the air.'],liquids:['Liquids','Smooth sounds made with the tongue shaping the airflow.'],glides:['Glides','Quick, smooth sounds that move into the next vowel.'],hw:['/hw/','A glide heard in words like which for some speakers. In many dialects, /hw/ and /w/ are pronounced the same.'],vowels:['Vowels','Sounds made with the voice and an open mouth shape. Every vowel is voiced.'],short:['Short vowels','Quick vowel sounds: cat, bed, sit, hot, cup. Marked with a breve: ă.'],long:['Long vowels','Vowels that “say their name”: cake, bee, bike, boat, cube. Marked with a macron: ā.'],rcontrolled:['R-Controlled vowels','Vowels shaped by /r/, as in car, her, and for.'],variant:['Variant vowels','Vowel sounds such as long oo, short oo, and aw that are not simply short or long.'],diphthongs:['Diphthongs','Gliding vowel sounds, as in boy and cow.'],macron:['Macron','A line over a vowel that marks a long vowel sound, as in ā.'],breve:['Breve','A curved mark over a vowel that marks a short vowel sound, as in ă.'],oo:['/ōō/ vs /oo/','Some vowel symbols are teacher-friendly phonics notation rather than strict IPA. This tool uses /ōō/ for the long oo sound in broom and /oo/ for the short oo sound in book. Some programs write long oo as /OO/.'],schwa:['Schwa /ə/','The relaxed vowel sound often heard in unstressed syllables, as in about.']};
    const S=(symbol,word,mark,voice,file,how)=>({symbol,word,mark,voice,file,how});
    const consonants=[
      {key:'stops',kind:'stops',definition:'Quick sounds made by stopping and releasing air.',rows:[['voiced',[S('b','bat','b','voiced','b','Close your lips to stop the air. Turn your voice on, then release the sound quickly.'),S('d','dog','d','voiced','d','Place your tongue just behind your front teeth. Turn your voice on, stop the air, then release it quickly.'),S('g','goat','g','voiced','g','Lift the back of your tongue to the soft part of the roof of your mouth. Turn your voice on, stop the air, then release it quickly.')]],['unvoiced',[S('p','pig','p','unvoiced','p','Close your lips to stop the air. Release the air quickly with your voice off.'),S('t','top','t','unvoiced','t','Place your tongue just behind your front teeth. Stop the air, then release it quickly with your voice off.'),S('k','cat','c','unvoiced','k','Lift the back of your tongue to the soft part of the roof of your mouth. Stop the air, then release it quickly. Keep your voice off.')]]]},
      {key:'affricates',kind:'affricates',definition:'Start like a stop, then release like a fricative.',rows:[['voiced',[S('j','jam','j','voiced','j','Place your tongue just behind your front teeth. Turn your voice on, stop the air, then release it through a narrow space.')]],['unvoiced',[S('ch','chip','ch','unvoiced','ch','Round your lips and place your tongue just behind your front teeth. Stop the air, then release it in a quick burst. Keep your voice off.')]]]},
      {key:'continuants',kind:'continuants',definition:'Sounds you can stretch or hold.',subs:[{key:'fricatives',items:[['voiced',[S('v','van','v','voiced','v','Place your top teeth lightly on your lower lip. Push air through the small gap and turn your voice on.'),S('TH','this','th','voiced','th-voiced','Place your tongue gently between your teeth. Turn your voice on and push air out slowly.'),S('z','zip','z','voiced','z','Place your tongue near the ridge behind your front teeth. Push air through a narrow space and turn your voice on.'),S('zh','measure','s','voiced','zh','Round your lips slightly and pull your tongue back. Push air out slowly and turn your voice on.')]],['unvoiced',[S('f','fan','f','unvoiced','f','Place your top teeth lightly on your lower lip. Push air through the small gap. Keep your voice off.'),S('th','thin','th','unvoiced','th-unvoiced','Place your tongue gently between your teeth. Push air out slowly with your voice off.'),S('s','sun','s','unvoiced','s','Place your tongue near the ridge behind your front teeth. Push air through a narrow space with your voice off.'),S('sh','ship','sh','unvoiced','sh','Bring your teeth close together and round your lips slightly. Pull your tongue back and push air out slowly. Keep your voice off.'),S('h','hat','h','unvoiced','h','Open your mouth slightly and let air flow out gently. Keep your tongue relaxed and your voice off.')]]]}, {key:'nasals',items:[['', [S('m','man','m','voiced','m','Close your lips and turn your voice on. Let the sound come through your nose.'),S('n','net','n','voiced','n','Place your tongue just behind your front teeth and turn your voice on. Let the sound come through your nose.'),S('ng','ring','ng','voiced','ng','Lift the back of your tongue to the soft part of the roof of your mouth. Keep your voice on and let the sound come through your nose.')]]]}]},
      {key:'approximants',kind:'approximants',definition:'Smooth sounds made without fully blocking the air.',subs:[{key:'liquids',items:[['',[S('l','leg','l','voiced','l','Place the tip of your tongue behind your front teeth. Keep your voice on as air flows around the sides of your tongue.'),S('r','red','r','voiced','r','Lift your tongue toward the roof of your mouth without touching it. Slightly round your lips and keep your voice on.')]]]}, {key:'glides',items:[['',[S('w','wet','w','voiced','w','Round your lips tightly, then glide into the next vowel. Keep your voice on.'),S('hw','which','wh','unvoiced','hw','Round your lips like /w/, then release a soft puff of air. Keep your voice off.'),S('y','yes','y','voiced','y','Lift your tongue high and forward, then glide into the next vowel. Keep your voice on.')]]]}]}
    ];
    const vowels=[{key:'short',items:[S('ă','cat','a','voiced','short-a','Open your mouth wide and drop your jaw. Pull the corners of your mouth back slightly. Keep your voice on.'),S('ĕ','bed','e','voiced','short-e','Open your mouth halfway. Lift your tongue slightly and pull the corners of your mouth back. Keep your jaw relaxed and your voice on.'),S('ĭ','sit','i','voiced','short-i','Keep your mouth slightly open. Lift the back of your tongue and keep your lips close together. Keep your voice on.'),S('ŏ','hot','o','voiced','short-o','Open your mouth wide and drop your jaw. Keep your lips relaxed and your tongue low. Keep your voice on.'),S('ŭ','cup','u','voiced','short-u','Open your mouth halfway. Keep your lips relaxed and your tongue low in your mouth. Keep your voice on.')]},{key:'long',items:[S('ā','cake','a','voiced','long-a','Start with your mouth relaxed and slightly open. Pull the corners of your mouth back as your tongue moves higher. Keep your voice on.'),S('ē','bee','ee','voiced','long-e','Keep your lips relaxed and slightly parted. Lift your tongue high and forward without touching the roof of your mouth. Keep your voice on.'),S('ī','bike','i','voiced','long-i','Start with your mouth open, then glide into a slight smile. Move your tongue forward and upward. Keep your voice on.'),S('ō','boat','oa','voiced','long-o','Start with your mouth open, then round your lips as the sound finishes. Move your tongue slightly higher and back. Keep your voice on.'),S('ū','cube','u','voiced','long-u','Round your lips as if getting ready to whistle. Keep your tongue high and toward the back of your mouth. Keep your voice on.')]},{key:'rcontrolled',items:[S('ar','car','ar','voiced','ar','Open your mouth and drop your jaw slightly. Pull the back of your tongue up as the /r/ shapes the sound. Keep your voice on.'),S('er','her','er','voiced','er','Slightly round your lips and lift your tongue toward the roof of your mouth without touching it. Keep your voice on.'),S('or','for','or','voiced','or','Round your lips and drop your jaw slightly. Pull your tongue back as the /r/ shapes the sound. Keep your voice on.')]},{key:'variant',items:[S('ōō','broom','oo','voiced','long-oo','Make a small, rounded lip shape. Keep your tongue high and toward the back of your mouth. Keep your voice on.'),S('oo','book','oo','voiced','short-oo','Round your lips slightly. Keep your tongue relaxed toward the back of your mouth and your jaw slightly open. Keep your voice on.'),S('aw','paw','aw','voiced','aw','Open your mouth and round your lips slightly. Keep your tongue low and toward the back of your mouth. Keep your voice on.')]},{key:'diphthongs',items:[S('oi','boy','oy','voiced','oi','Start with rounded lips, then glide into a tighter mouth shape. Keep your voice on.'),S('ow','cow','ow','voiced','ow','Start with your mouth open and your tongue low. Round your lips as the sound finishes. Keep your voice on.')]},{key:'schwa',items:[S('ə','about','a','voiced','schwa','Relax your mouth and tongue. Keep your voice on and make a quick, unstressed vowel sound.')] }];
    const $=s=>document.querySelector(s), esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    const icon=()=>'';
    function tile(sound,category,sub,accent,contrast){return `<button class="tile" type="button" style="--accent:var(${accent});--tint:var(${accent}-t)" data-sound="${encodeURIComponent(JSON.stringify({...sound,category,sub,accent}))}" aria-label="/${sound.symbol}/, as in ${sound.word}"><span><b class="slash">/</b>${sound.symbol}<b class="slash">/</b></span></button>`}
    function rows(groups,category,sub,accent){const contrast=groups.length>1;return groups.map(([voice,items])=>`<div class="sound-row">${contrast?`<span class="row-label"><i class="voice-dot ${voice==='voiced'?'on':'off'}" style="--accent:var(${accent})"></i>${voice}</span>`:''}<div class="cards">${items.map(s=>tile(s,category,sub,accent,contrast)).join('')}</div></div>`).join('')}
    function panel(group){const sub=group.subs?`<div class="nested-group"><div class="nested-label">${group.key==='continuants'?'Types of continuants':'Types of approximants'}</div><div class="group-layout">${group.subs.map((x,i)=>`<section class="subpanel ${i===0&&group.key==='continuants'?'wide':''}"><div class="panel-head"><h3>${terms[x.key][0]}</h3>${icon(x.key)}</div><p class="sub-definition">${terms[x.key][1]}</p>${rows(x.items,group.key,x.key,group.kind==='continuants'?'--cont':'--app')}</section>`).join('')}</div></div>`:rows(group.rows,group.key,'',group.kind==='stops'?'--stop':'--aff');return `<section class="panel ${group.key}"><div class="panel-head"><h2>${terms[group.key][0]}</h2>${icon(group.key)}</div><p class="definition">${group.definition}</p>${sub}</section>`}
    $('#consonants').innerHTML=`<div class="chart"><div class="chart-row">${panel(consonants[0])}${panel(consonants[1])}<aside class="legend" aria-label="Voicing key"><strong>Voicing</strong><div><i class="voice-dot on" style="--accent:var(--stop)"></i> voiced — cords on</div><div><i class="voice-dot off"></i> unvoiced — cords off</div></aside></div>${panel(consonants[2])}${panel(consonants[3])}</div>`;
    const vowelPanel=g=>`<section class="panel vowel v${g.key}"><div class="panel-head"><h2>${terms[g.key][0]}</h2>${icon(g.key)}</div><div class="cards" style="margin-top:12px">${g.items.map(s=>tile(s,'vowels',g.key,'--vow',false)).join('')}</div></section>`;
    const otherVowelItems=[].concat(
      vowels[2].items.map(s=>[s,'rcontrolled']),
      vowels[3].items.map(s=>[s,'variant']),
      vowels[4].items.map(s=>[s,'diphthongs']),
      vowels[5].items.map(s=>[s,'schwa'])
    );
    const otherCard=`<section class="panel vowel vother"><div class="panel-head"><h2>Other vowels</h2></div><div class="cards" style="margin-top:12px">${otherVowelItems.map(([s,sub])=>tile(s,'vowels',sub,'--vow',false)).join('')}</div></section>`;
    $('#vowels').innerHTML=`<div class="vowel-intro"><h2>Vowels</h2></div><p class="vowel-note"><span><b>Teacher note:</b> This chart uses teacher-friendly phonics notation. Long vowels use a <b>macron</b>, as in <code>/ā/</code>. Short vowels use a <b>breve</b>, as in <code>/ă/</code>. All vowels are voiced and can be held.</span></p><div class="chart"><div class="chart-row">${vowelPanel(vowels[0])}${vowelPanel(vowels[1])}</div><div class="chart-row">${otherCard}</div></div>`;
    let current=null,audio=null,lastTile=null,activeView='consonants',termAudio=null;
    function clearAudio(){if(audio){audio.pause();audio.currentTime=0;audio=null}if(termAudio){termAudio.pause();termAudio.currentTime=0;termAudio=null}$('#play').disabled=false}
    function highlight(word,mark){const i=word.toLowerCase().indexOf(mark.toLowerCase());return i<0?esc(word):esc(word.slice(0,i))+`<span class="highlight">${esc(word.slice(i,i+mark.length))}</span>`+esc(word.slice(i+mark.length))}
    function closeSound(){clearAudio();if(lastTile)lastTile.classList.remove('selected');lastTile=null;current=null;$('#sound-dock').classList.remove('show');document.body.classList.remove('has-dock')}
    function selectSound(button){if(button===lastTile&&$('#sound-dock').classList.contains('show')){closeSound();return}clearAudio();if(lastTile)lastTile.classList.remove('selected');lastTile=button;button.classList.add('selected');current=JSON.parse(decodeURIComponent(button.dataset.sound));const cs=getComputedStyle(document.documentElement);const accent=cs.getPropertyValue('--teal').trim();const tint=cs.getPropertyValue('--la-soft-teal-bg').trim();const dock=$('#sound-dock');dock.style.setProperty('--accent',accent);dock.style.setProperty('--tint',tint);$('#selected-phoneme').innerHTML=`<b class="slash">/</b>${esc(current.symbol)}<b class="slash">/</b>`;const labels={stops:'Stop',affricates:'Affricate',continuants:'Continuant',approximants:'Approximant',vowels:'Vowel',fricatives:'Fricative',nasals:'Nasal',liquids:'Liquid',glides:'Glide',short:'Short',long:'Long',rcontrolled:'R-Controlled',variant:'Variant',diphthongs:'Diphthong',schwa:'Schwa'};let crumbs=current.category==='vowels'?[]:['Consonant'];crumbs.push(labels[current.category]);if(current.sub)crumbs.push(labels[current.sub]);const badge=`<span class="badge ${current.voice==='unvoiced'?'unvoiced':''}"><i class="voice-dot ${current.voice==='voiced'?'on':'off'}" style="--accent:${accent}"></i>${current.voice}</span>`;$('#breadcrumb').innerHTML=crumbs.map(esc).join('<span class="sep">›</span>')+`<span class="sep">·</span>${badge}`;$('#sound-example').innerHTML=`as in ${highlight(current.word,current.mark)}`;$('#sound-how').textContent=current.how;$('#audio-status').textContent='';dock.classList.add('show');document.body.classList.add('has-dock')}
    function play(){if(!current)return;clearAudio();const src=`phonemes/${current.file}.mp3`;const player=new Audio(src);audio=player;const status=$('#audio-status'),button=$('#play');button.disabled=true;status.textContent='';let settled=false;const unavailable=()=>{if(settled)return;settled=true;button.disabled=false;status.textContent='Audio file not available yet.';if(audio===player)audio=null};player.addEventListener('error',unavailable,{once:true});player.addEventListener('canplay',()=>{if(audio!==player||settled)return;player.play().then(()=>{button.disabled=false}).catch(unavailable)},{once:true});player.addEventListener('ended',()=>{if(audio===player){status.textContent='';audio=null}},{once:true});player.load()}
    document.addEventListener('click',e=>{const b=e.target.closest('.tile');if(b)selectSound(b);const term=e.target.closest('[data-term]');if(term){openKey();const target=$(`#term-${term.dataset.term}`);if(target)target.scrollIntoView({block:'center'})}});$('#play').addEventListener('click',play);
    function view(name){closeSound();if(lastTile)lastTile.classList.remove('selected');lastTile=null;current=null;activeView=name;$('#consonants').hidden=name!=='consonants';$('#vowels').hidden=name!=='vowels';$('#consonant-tab').setAttribute('aria-selected',String(name==='consonants'));$('#vowel-tab').setAttribute('aria-selected',String(name==='vowels'))}
    $('#consonant-tab').addEventListener('click',()=>view('consonants'));$('#vowel-tab').addEventListener('click',()=>view('vowels'));document.querySelectorAll('[role=tab]').forEach((tab,i)=>tab.addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight'].includes(e.key)){e.preventDefault();document.querySelectorAll('[role=tab]')[(i+(e.key==='ArrowRight'?1:-1)+2)%2].click()}}));
    const conOrder=['phoneme','grapheme','voiced','unvoiced','stops','affricates','continuants','fricatives','nasals','approximants','liquids','glides','hw'];const vowOrder=['phoneme','grapheme','short','long','rcontrolled','variant','diphthongs','schwa','macron','breve','oo'];
    const termAudioFiles={phoneme:'phoneme',grapheme:'grapheme',macron:'macron',breve:'breve',diphthongs:'diphthong',schwa:'schwa'};
    function speakerIcon(){return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10v4h4l5 4V6l-5 4H4z"/><path d="M16 9.5c1.1 1.1 1.1 3.9 0 5"/><path d="M18.5 7c2.2 2.5 2.2 7.5 0 10"/></svg>`}
    function termAudioButton(k){if(!termAudioFiles[k])return '';const label=terms[k][0].replace(/<[^>]*>/g,'');return `<button class="term-audio" type="button" data-term-audio="${termAudioFiles[k]}" aria-label="Hear pronunciation of ${esc(label)}">${speakerIcon()}</button>`}
    function buildKey(){const order=activeView==='consonants'?conOrder:vowOrder;let html='<dl>'+order.map(k=>`<div class="term" id="term-${k}"><dt>${terms[k][0]}${termAudioButton(k)}</dt><dd>${terms[k][1]}</dd></div>`).join('')+'</dl>';if(activeView==='consonants')html+=`<p class="key-note"><b>Teacher-friendly notation.</b> This tool uses teacher-friendly phonics notation. Some symbols are written differently in linguistic IPA or in different reading programs.</p>`;$('#drawer-body').innerHTML=html}
    function playTermAudio(name){if(termAudio){termAudio.pause();termAudio.currentTime=0;termAudio=null}const player=new Audio(`audio/terms/${name}.mp3`);termAudio=player;player.addEventListener('ended',()=>{if(termAudio===player)termAudio=null},{once:true});player.addEventListener('error',()=>{if(termAudio===player)termAudio=null},{once:true});player.play().catch(()=>{if(termAudio===player)termAudio=null})}
    function openKey(){buildKey();$('#key-backdrop').classList.add('open');$('#drawer').classList.add('open');$('#drawer').setAttribute('aria-hidden','false');$('#close-key').focus()}function closeKey(){$('#key-backdrop').classList.remove('open');$('#drawer').classList.remove('open');$('#drawer').setAttribute('aria-hidden','true')}$('#open-key').addEventListener('click',openKey);$('#close-key').addEventListener('click',closeKey);$('#key-backdrop').addEventListener('click',closeKey);$('#drawer-body').addEventListener('click',e=>{const btn=e.target.closest('[data-term-audio]');if(btn){e.preventDefault();playTermAudio(btn.dataset.termAudio)}});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeSound();closeKey()}});
  })();
  </script>
